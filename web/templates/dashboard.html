<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自动发文系统 - 面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .safe-area-top {
            padding-top: env(safe-area-inset-top, 0px);
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen safe-area-bottom" x-data="{ logout() {
    fetch('/api/logout').then(() => window.location.href = '/login');
}}">
    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm sticky top-0 z-40 safe-area-top">
        <div class="flex items-center justify-between px-4 py-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-800">自动发文系统</h1>
                    <p class="text-xs text-gray-500">AI 驱动 · 智能创作</p>
                </div>
            </div>
            <button @click="logout" class="text-gray-500 hover:text-red-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="px-4 py-6 space-y-6 max-w-lg mx-auto">
        <!-- 欢迎卡片 -->
        <div class="bg-gradient-to-r from-primary to-blue-600 rounded-2xl p-5 text-white shadow-lg">
            <h2 class="text-xl font-bold mb-1">👋 欢迎回来</h2>
            <p class="text-white/80 text-sm">准备好今天的内容创作了吗？</p>
        </div>

        <!-- 功能卡片网格 -->
        <div class="grid grid-cols-2 gap-4">
            <a href="/inspiration" class="bg-white rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
                <div class="w-12 h-12 bg-yellow-100 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                    </svg>
                </div>
                <h3 class="font-bold text-gray-800">💡 灵感创作</h3>
                <p class="text-xs text-gray-500 mt-1">多来源整合 · AI 扩写</p>
                <div class="mt-3 text-primary text-sm font-medium flex items-center">
                    开始创作 →
                </div>
            </a>

            <div class="bg-white rounded-2xl p-5 shadow-sm opacity-60">
                <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                </div>
                <h3 class="font-bold text-gray-800">🔄 RSS 抓取</h3>
                <p class="text-xs text-gray-500 mt-1">自动抓取 · 定时任务</p>
                <div class="mt-3 text-gray-400 text-sm">
                    即将上线
                </div>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm opacity-60">
                <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </div>
                <h3 class="font-bold text-gray-800">📊 发布历史</h3>
                <p class="text-xs text-gray-500 mt-1">发布记录 · 数据统计</p>
                <div class="mt-3 text-gray-400 text-sm">
                    即将上线
                </div>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm opacity-60">
                <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </div>
                <h3 class="font-bold text-gray-800">⚙️ 系统设置</h3>
                <p class="text-xs text-gray-500 mt-1">账号配置 · API 密钥</p>
                <div class="mt-3 text-gray-400 text-sm">
                    即将上线
                </div>
            </div>
        </div>

        <!-- 系统状态 -->
        <div class="bg-white rounded-2xl p-5 shadow-sm">
            <h3 class="font-bold text-gray-800 mb-4 flex items-center">
                <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span>
                系统状态
            </h3>
            <div class="space-y-3">
                <div class="flex items-center justify-between">
                    <span class="text-gray-600 text-sm">API 服务</span>
                    <span class="text-green-600 text-sm font-medium">● 正常运行</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-gray-600 text-sm">微信接口</span>
                    <span class="text-green-600 text-sm font-medium">● 已连接</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-gray-600 text-sm">AI 模型</span>
                    <span class="text-green-600 text-sm font-medium">● 可用</span>
                </div>
            </div>
        </div>

        <!-- 底部说明 -->
        <div class="text-center text-gray-400 text-xs pt-4">
            <p>版本 v2.0.0 · FastAPI + Tailwind CSS</p>
            <p class="mt-1">支持 Vercel 一键部署</p>
        </div>
    </main>
</body>
</html>
